services:
  mihomo:
    image: registry.cn-hangzhou.aliyuncs.com/lacogito/mihomo:latest
    container_name: mihomo
    restart: always
    volumes:
      - ./config:/root/.config/mihomo
    ports:
      - "17890:7890"
      - "17891:7891"
      - "19090:9090"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
